ss="line">    <span class="function"><span class="type">void</span> <span class="title">put</span><span class="params">(string key, <span class="type">int</span> val)</span></span>&#123;</span><br><span class="line">        <span class="comment">// iterative</span></span><br><span class="line">        </span><br><span class="line">        <span class="comment">// TrieNode *p = root;</span></span><br><span class="line">        <span class="comment">// for(char c:key)&#123;</span></span><br><span class="line">        <span class="comment">//     if(!p-&gt;children[c-&#x27;a&#x27;]) p-&gt;children[c-&#x27;a&#x27;] = new TrieNode();</span></span><br><span class="line">        <span class="comment">//     p=p-&gt;children[c-&#x27;a&#x27;];</span></span><br><span class="line">        <span class="comment">// &#125;</span></span><br><span class="line">        <span class="comment">// p-&gt;val = val;</span></span><br><span class="line">        <span class="comment">// p-&gt;isWord = true;</span></span><br><span class="line">        </span><br><span class="line">        <span class="comment">//recursive</span></span><br><span class="line">        root = <span class="built_in">put</span>(root, key, val, <span class="number">0</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="function"><span class="type">bool</span> <span class="title">search</span><span class="params">(string word)</span></span>&#123;</span><br><span class="line">        TrieNode *p = root;</span><br><span class="line">        <span class="keyword">for</span>(<span class="type">char</span> c:word)&#123;</span><br><span class="line">            <span class="keyword">if</span>(!p-&gt;children[c-<span class="string">&#x27;a&#x27;</span>]) <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">            p=p-&gt;children[c-<span class="string">&#x27;a&#x27;</span>];</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> p-&gt;isWord;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    <span class="comment">// 從節點 node 開始搜索 key，如果存在返回對應節點，否則返回 null</span></span><br><span class="line">    <span class="function">TrieNode* <span class="title">getNode</span><span class="params">(TrieNode *node, string key)</span></span>&#123;</span><br><span class="line">        TrieNode *p = node;</span><br><span class="line">        <span class="comment">// 從節點 node 開始搜索 key</span></span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; key.<span class="built_in">size</span>(); i++) &#123;</span><br><span class="line">            <span class="keyword">if</span> (!p ) &#123;</span><br><span class="line">                <span class="comment">// 無往向下搜索</span></span><br><span class="line">                <span class="keyword">return</span> <span class="literal">nullptr</span>;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">// 向下搜索</span></span><br><span class="line">            <span class="type">char</span> c = key[i];</span><br><span class="line">            p = p-&gt;children[c-<span class="string">&#x27;a&#x27;</span>];</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> p;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 搜索 key 對應的值，不存在則返回 null</span></span><br><span class="line">    <span class="function"><span class="type">int</span> <span class="title">get</span><span class="params">(string prefix)</span></span>&#123;</span><br><span class="line">        TrieNode * x = <span class="built_in">getNode</span>(root, prefix);</span><br><span class="line">        <span class="keyword">if</span> (x == <span class="literal">nullptr</span> || x-&gt;val == <span class="number">0</span>) &#123;</span><br><span class="line">        <span class="comment">// x 為空或 x 的 val 字段為空都说明 key 没有對應的值</span></span><br><span class="line">            <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> x-&gt;val;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 搜尋所有前綴為prefix 所有鍵</span></span><br><span class="line">    <span class="comment">// keysWithPrefix(&quot;th&quot;) -&gt; [&quot;that&quot;, &quot;the&quot;, &quot;them&quot;]</span></span><br><span class="line">    <span class="function">vector&lt;string&gt; <span class="title">keysWithPrefix</span><span class="params">(string prefix)</span></span>&#123;</span><br><span class="line">        vector&lt;string&gt; ret;</span><br><span class="line">        TrieNode * x = <span class="built_in">getNode</span>(root, prefix);</span><br><span class="line">        <span class="keyword">if</span>(x==<span class="literal">nullptr</span>) <span class="keyword">return</span> ret;</span><br><span class="line">        <span class="comment">// DFS 遍歷以 x 為根的這棵 Trie 樹</span></span><br><span class="line">        <span class="built_in">traverse</span>(x, prefix, ret);</span><br><span class="line">        <span class="keyword">return</span> ret;</span><br><span class="line">        </span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 遍歷以 node 節點為根的 Trie 樹，找到所有鍵</span></span><br><span class="line">    <span class="function"><span class="type">void</span> <span class="title">traverse</span><span class="params">(TrieNode *node, string path, vector&lt;string&gt; &amp; ret)</span></span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(node == <span class="literal">nullptr</span>) <span class="keyword">return</span>;</span><br><span ne">        <span class="type">char</span> c = pattern[i];</span><br><span class="line">        <span class="keyword">if</span>(c==<span class="string">&#x27;.&#x27;</span>)&#123;</span><br><span class="line">            <span class="keyword">for</span>(<span class="type">char</span> j = <span class="string">&#x27;a&#x27;</span> ;j&lt;=<span class="string">&#x27;z&#x27;</span>;++j)&#123;</span><br><span class="line">                path.<span class="built_in">push_back</span>(j);</span><br><span class="line">                <span class="built_in">traverse</span>(node-&gt;children[j-<span class="string">&#x27;a&#x27;</span>], path,pattern, i+<span class="number">1</span>, ret);</span><br><span class="line">                path.<span class="built_in">pop_back</span>();</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">else</span>&#123;</span><br><span class="line">            path.<span class="built_in">push_back</span>(c);</span><br><span class="line">            <span class="built_in">traverse</span>(node-&gt;children[c-<span class="string">&#x27;a&#x27;</span>], path,pattern, i+<span class="number">1</span>, ret);</span><br><span class="line">            path.<span class="built_in">pop_back</span>();</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">MapSum</span> &#123;</span><br><span class="line"><span class="keyword">private</span>:</span><br><span class="line">    Trie *root;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">    <span class="built_in">MapSum</span>() &#123;</span><br><span class="line">        root = <span class="keyword">new</span> <span class="built_in">Trie</span>();</span><br
